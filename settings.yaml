### GraphRAG 3.1 local configuration.
### Provider and model values come from .env so the same local application can
### use OpenAI or an Ollama-compatible endpoint without changing source files.

# Parallel LLM requests across extraction, community reports, and embeddings.
# Resolved from the environment so the workbench can tune it per provider:
# Ollama defaults to 1 (a local server serializes anyway), hosted APIs to 4.
# Raise GRAPHRAG_CONCURRENT_REQUESTS in .env once your API tier allows it —
# GraphRAG's own default is 25. If parallel requests start failing with a
# misleading 401 permission error, lower it again; some OpenAI projects
# permit the model but reject concurrent GraphRAG traffic.
concurrent_requests: ${GRAPHRAG_CONCURRENT_REQUESTS}
async_mode: asyncio

# exceptions_to_skip overrides graphrag_llm's default non-retry list, which
# includes BadRequestError and PermissionDeniedError. OpenAI accounts flagged
# for "unusual activity" intermittently reject valid requests with a
# BadRequestError ("insufficient permissions for this operation"); retrying
# with backoff absorbs those blips. Genuinely broken requests still fail
# after max_retries and surface in the build terminal.
completion_models:
  default_completion_model:
    model_provider: ${GRAPHRAG_COMPLETION_PROVIDER}
    model: ${GRAPHRAG_COMPLETION_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_COMPLETION_API_BASE}
    retry:
      type: exponential_backoff
      max_retries: 5
      base_delay: 2
      max_delay: 30
      jitter: true
      exceptions_to_skip:
        - UnsupportedParamsError
        - ContextWindowExceededError
        - ContentPolicyViolationError
        - ImageFetchError
        - InvalidRequestError
        - AuthenticationError
        - NotFoundError
        - UnprocessableEntityError
        - APIResponseValidationError
        - BudgetExceededError

embedding_models:
  default_embedding_model:
    model_provider: ${GRAPHRAG_EMBEDDING_PROVIDER}
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_EMBEDDING_API_BASE}
    retry:
      type: exponential_backoff
      max_retries: 5
      base_delay: 2
      max_delay: 30
      jitter: true
      exceptions_to_skip:
        - UnsupportedParamsError
        - ContextWindowExceededError
        - ContentPolicyViolationError
        - ImageFetchError
        - InvalidRequestError
        - AuthenticationError
        - NotFoundError
        - UnprocessableEntityError
        - APIResponseValidationError
        - BudgetExceededError

input:
  type: text

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

input_storage:
  type: file
  base_dir: input

output_storage:
  type: file
  base_dir: output

reporting:
  type: file
  base_dir: logs

cache:
  type: json
  storage:
    type: file
    base_dir: cache

vector_store:
  type: lancedb
  db_uri: output/lancedb
  # Must match the embedding model: text-embedding-3-small returns 1,536
  # dimensions and qwen3-embedding:0.6b returns 1,024. GraphRAG 3.1 otherwise defaults
  # the Lance schema to 3,072 and folds two embeddings into each row. The
  # workbench resolves this per provider; override in .env if needed.
  vector_size: ${GRAPHRAG_EMBEDDING_VECTOR_SIZE}

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: prompts/extract_graph.txt
  entity_types: [organization, person, geo, event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: prompts/summarize_descriptions.txt
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: prompts/extract_claims.txt
  description: Any claims or facts that could be relevant to information discovery.
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: prompts/community_report_graph.txt
  text_prompt: prompts/community_report_text.txt
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/local_search_system_prompt.txt

global_search:
  completion_model_id: default_completion_model
  map_prompt: prompts/global_search_map_system_prompt.txt
  reduce_prompt: prompts/global_search_reduce_system_prompt.txt
  knowledge_prompt: prompts/global_search_knowledge_system_prompt.txt

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/drift_search_system_prompt.txt
  reduce_prompt: prompts/drift_reduce_prompt.txt

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/basic_search_system_prompt.txt

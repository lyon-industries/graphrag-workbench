### GraphRAG 3.1 local configuration.
### Provider and model values come from .env so the same local application can
### use OpenAI or an Ollama-compatible endpoint without changing source files.

# Keep the local default conservative. Some OpenAI projects permit Luna but
# reject parallel GraphRAG requests with a misleading 401 permission error.
concurrent_requests: 1
async_mode: asyncio

completion_models:
  default_completion_model:
    model_provider: ${GRAPHRAG_COMPLETION_PROVIDER}
    model: ${GRAPHRAG_COMPLETION_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_COMPLETION_API_BASE}
    retry:
      type: exponential_backoff
      max_retries: 5
      base_delay: 2
      max_delay: 30
      jitter: true

embedding_models:
  default_embedding_model:
    model_provider: ${GRAPHRAG_EMBEDDING_PROVIDER}
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_EMBEDDING_API_BASE}
    retry:
      type: exponential_backoff
      max_retries: 5
      base_delay: 2
      max_delay: 30
      jitter: true

input:
  type: text

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

input_storage:
  type: file
  base_dir: input

output_storage:
  type: file
  base_dir: output

reporting:
  type: file
  base_dir: logs

cache:
  type: json
  storage:
    type: file
    base_dir: cache

vector_store:
  type: lancedb
  db_uri: output/lancedb
  # text-embedding-3-small returns 1,536 dimensions. GraphRAG 3.1 otherwise
  # defaults the Lance schema to 3,072 and folds two embeddings into each row.
  vector_size: 1536

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: prompts/extract_graph.txt
  entity_types: [organization, person, geo, event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: prompts/summarize_descriptions.txt
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: prompts/extract_claims.txt
  description: Any claims or facts that could be relevant to information discovery.
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: prompts/community_report_graph.txt
  text_prompt: prompts/community_report_text.txt
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/local_search_system_prompt.txt

global_search:
  completion_model_id: default_completion_model
  map_prompt: prompts/global_search_map_system_prompt.txt
  reduce_prompt: prompts/global_search_reduce_system_prompt.txt
  knowledge_prompt: prompts/global_search_knowledge_system_prompt.txt

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/drift_search_system_prompt.txt
  reduce_prompt: prompts/drift_reduce_prompt.txt

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: prompts/basic_search_system_prompt.txt
